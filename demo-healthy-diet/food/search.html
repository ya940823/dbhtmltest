<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>食物搜尋入口｜智慧健康飲食系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <script defer src="../assets/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <header class="topbar">
        <div class="brand"><div class="logo">LOGO</div><div><div style="font-size:14px;">食物營養查詢</div><div class="muted" style="font-size:12px;">食物搜尋入口（示意）</div></div></div>
        <div class="top-actions" data-auth-slot></div>
      </header>

      <nav class="mainnav">
        <div class="navlinks">
          <a href="../index.html">首頁</a>
          <a href="../food/search.html" aria-current="page">食物營養查詢</a>
          <a href="../log/new.html">飲食紀錄管理</a>
          <a href="../goals.html">健康目標</a>
          <a href="../advice/basic.html">健康建議</a>
        </div>
      </nav>

      <nav class="subnav">
        <a href="./search.html" aria-current="page">搜尋入口</a>
        <a href="./categories.html">分類查詢</a>
        <a href="./list.html">食物列表瀏覽</a>
        <a href="./detail.html">營養詳細資料</a>
      </nav>

      <div class="content">
        <div class="card">
          <h3>食物搜尋（示意）</h3>
          <p class="muted">輸入關鍵字 → 顯示列表 → 點進詳細頁（本範例用跳轉取代）。</p>

          <div class="row">
            <div class="field">
              <label for="q">關鍵字</label>
              <input id="q" placeholder="例如：雞胸肉、地瓜…" />
            </div>
            <div class="field">
              <label for="cat">分類</label>
              <select id="cat">
                <option value="">全部</option>
                <option>主食</option><option>蛋白質</option><option>蔬果</option><option>飲料</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button class="btn primary" type="button" id="btnSearch">查詢（示意）</button>
            <a class="btn" href="./list.html">直接看列表</a>
          </div>

          <div class="section" style="border:1.5px solid var(--border); border-radius:var(--radius); margin-top:12px;">
            <h2>查詢結果（示意）</h2>
            <p>點「查看詳細」會跳到詳細頁。</p>
            <div class="actions" style="margin-top:10px;">
              <a class="btn" href="./detail.html">查看詳細：雞胸肉</a>
              <a class="btn" href="./detail.html">查看詳細：地瓜</a>
            </div>
          </div>
        </div>
      </div>

      <footer class="footerbar">
        <a href="../about.html">系統說明</a>
        <span class="muted">｜</span>
        <a href="../source.html">資料來源說明</a>
        <span class="muted">｜</span>
        <a href="../contact.html">聯絡資訊</a>
      </footer>
    </div>
  </div>

  <script>
    document.getElementById("btnSearch").addEventListener("click", () => {
      alert("示範：送出查詢（目前無後端）");
    });
  </script>
</body>
</html>
