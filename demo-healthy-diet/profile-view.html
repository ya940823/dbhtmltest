<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>查看個人資料｜智慧健康飲食系統</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <header class="topbar">
        <div class="brand"><div class="logo">LOGO</div><div><div style="font-size:14px;">查看個人資料</div><div class="muted" style="font-size:12px;">個人資料管理（示意）</div></div></div>
        <div class="top-actions" data-auth-slot></div>
      </header>

      <nav class="mainnav">
        <div class="navlinks">
          <a href="./index.html">首頁</a>
          <a href="./member.html">會員專區</a>
          <a href="./food/search.html">食物營養查詢</a>
          <a href="./log/new.html">飲食紀錄</a>
          <a href="./advice/basic.html">健康建議</a>
        </div>
      </nav>

      <nav class="subnav">
        <a href="./member.html">會員專區</a>
        <a href="./profile-view.html" aria-current="page">查看個人資料</a>
        <a href="./profile-edit.html">修改個人資料</a>
        <a href="./goals.html">健康目標設定</a>
      </nav>

      <div class="content">
        <div class="card">
          <h3>個人資料（示意）</h3>
          <p class="muted">此頁只展示資料；實作可串接後端 API。</p>
          <div id="profileBox" class="section" style="border:1.5px solid var(--border); border-radius:var(--radius);"></div>
          <div class="actions" style="margin-top:10px;">
            <a class="btn primary" href="./profile-edit.html">修改個人資料</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireLoginHere();
      const u = getUser() || { name:"Demo 使用者", email:"demo@example.com" };
      const demoProfile = JSON.parse(localStorage.getItem("demo_profile") || "null") || {
        name: u.name, sex: "男", age: 25, height: 170, weight: 65
      };
      document.getElementById("profileBox").innerHTML = `
        <p><b>姓名：</b>${demoProfile.name}</p>
        <p><b>Email：</b>${u.email}</p>
        <p><b>性別：</b>${demoProfile.sex}</p>
        <p><b>年齡：</b>${demoProfile.age}</p>
        <p><b>身高：</b>${demoProfile.height} cm</p>
        <p><b>體重：</b>${demoProfile.weight} kg</p>
      `;
    });
  </script>
</body>
</html>
