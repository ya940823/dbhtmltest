<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>健康目標｜智慧健康飲食系統</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <header class="topbar">
        <div class="brand"><div class="logo">LOGO</div><div><div style="font-size:14px;">健康目標設定</div><div class="muted" style="font-size:12px;">對應功能樹：健康目標設定</div></div></div>
        <div class="top-actions" data-auth-slot></div>
      </header>

      <nav class="mainnav">
        <div class="navlinks">
          <a href="./index.html">首頁</a>
          <a href="./food/search.html">食物營養查詢</a>
          <a href="./log/new.html">飲食紀錄管理</a>
          <a href="./log/history.html">歷史紀錄</a>
          <a href="./goals.html" aria-current="page">健康目標</a>
          <a href="./advice/basic.html">健康建議</a>
        </div>
      </nav>

      <div class="content">
        <div class="card">
          <h3>健康目標（示意）</h3>
          <p class="muted">示範：儲存在 localStorage；可搭配飲食建議頁顯示提醒。</p>

          <div class="row">
            <div class="field">
              <label for="goalType">目標類型</label>
              <select id="goalType">
                <option>減脂</option>
                <option>增肌</option>
                <option>維持</option>
              </select>
            </div>
            <div class="field">
              <label for="kcal">每日熱量(kcal)</label>
              <input id="kcal" type="number" />
            </div>
          </div>

          <div class="row">
            <div class="field"><label for="protein">蛋白質(g)</label><input id="protein" type="number" /></div>
            <div class="field"><label for="fat">脂肪(g)</label><input id="fat" type="number" /></div>
          </div>

          <div class="row">
            <div class="field"><label for="carbs">碳水(g)</label><input id="carbs" type="number" /></div>
            <div class="field"><label>&nbsp;</label><div class="muted">（此欄保留）</div></div>
          </div>

          <div class="actions">
            <button class="btn primary" type="button" id="btnSaveGoals">儲存目標</button>
            <a class="btn" href="./member.html">回會員專區</a>
          </div>
        </div>
      </div>

      <footer class="footerbar">
        <a href="./about.html">系統說明</a>
        <span class="muted">｜</span>
        <a href="./source.html">資料來源說明</a>
        <span class="muted">｜</span>
        <a href="./contact.html">聯絡資訊</a>
      </footer>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireLoginHere();
      const g = getGoals();
      goalType.value = g.goalType;
      kcal.value = g.kcal;
      protein.value = g.protein;
      fat.value = g.fat;
      carbs.value = g.carbs;

      btnSaveGoals.addEventListener("click", () => {
        setGoals({
          goalType: goalType.value,
          kcal: Number(kcal.value || 0),
          protein: Number(protein.value || 0),
          fat: Number(fat.value || 0),
          carbs: Number(carbs.value || 0),
        });
        alert("已儲存健康目標（示範）");
      });
    });
  </script>
</body>
</html>
