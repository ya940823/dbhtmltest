<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>營養攝取分析｜智慧健康飲食系統</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <script defer src="../assets/app.js"></script>
</head>
<body>
  <div class="wrap"><div class="app">
    <header class="topbar">
      <div class="brand"><div class="logo">LOGO</div><div><div style="font-size:14px;">營養攝取分析</div><div class="muted" style="font-size:12px;">對應功能樹：健康飲食建議 → 營養攝取分析</div></div></div>
      <div class="top-actions" data-auth-slot></div>
    </header>

    <nav class="mainnav">
      <div class="navlinks">
        <a href="../index.html">首頁</a>
        <a href="../food/search.html">食物營養查詢</a>
        <a href="../log/new.html">飲食紀錄管理</a>
        <a href="../goals.html">健康目標</a>
        <a href="../advice/basic.html" aria-current="page">健康建議</a>
      </div>
    </nav>

    <nav class="subnav">
      <a href="./analysis.html" aria-current="page">營養攝取分析</a>
      <a href="./alerts.html">過高/不足提醒</a>
      <a href="./basic.html">基本飲食調整建議</a>
    </nav>

    <div class="content">
      <div class="card">
        <h3>分析結果（示意）</h3>
        <p class="muted">示範：讀取你設定的健康目標（localStorage）。</p>
        <div id="goalBox" class="section" style="border:1.5px solid var(--border); border-radius:var(--radius);"></div>

        <div class="actions" style="margin-top:10px;">
          <a class="btn primary" href="./alerts.html">查看提醒</a>
          <a class="btn" href="../goals.html">調整健康目標</a>
        </div>
      </div>
    </div>
  </div></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireLoginHere();
      const g = getGoals();
      document.getElementById("goalBox").innerHTML = `
        <p><b>目標類型：</b>${g.goalType}</p>
        <p><b>每日熱量：</b>${g.kcal} kcal</p>
        <p><b>蛋白質：</b>${g.protein} g｜<b>脂肪：</b>${g.fat} g｜<b>碳水：</b>${g.carbs} g</p>
        <p class="muted">（示意）可在此加上：今日攝取 vs 目標差距、圖表、建議等。</p>
      `;
    });
  </script>
</body>
</html>
