<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>修改個人資料｜智慧健康飲食系統</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <header class="topbar">
        <div class="brand"><div class="logo">LOGO</div><div><div style="font-size:14px;">修改個人資料</div><div class="muted" style="font-size:12px;">個人資料管理（示意）</div></div></div>
        <div class="top-actions" data-auth-slot></div>
      </header>

      <nav class="mainnav">
        <div class="navlinks">
          <a href="./index.html">首頁</a>
          <a href="./member.html">會員專區</a>
          <a href="./food/search.html">食物營養查詢</a>
          <a href="./log/new.html">飲食紀錄</a>
          <a href="./advice/basic.html">健康建議</a>
        </div>
      </nav>

      <nav class="subnav">
        <a href="./member.html">會員專區</a>
        <a href="./profile-view.html">查看個人資料</a>
        <a href="./profile-edit.html" aria-current="page">修改個人資料</a>
        <a href="./goals.html">健康目標設定</a>
      </nav>

      <div class="content">
        <div class="card">
          <h3>修改個人資料（示意）</h3>
          <p class="muted">示範：按儲存後寫入 localStorage。</p>

          <div class="row">
            <div class="field"><label for="name">姓名</label><input id="name" /></div>
            <div class="field">
              <label for="sex">性別</label>
              <select id="sex"><option>男</option><option>女</option><option>其他</option></select>
            </div>
          </div>

          <div class="row">
            <div class="field"><label for="age">年齡</label><input id="age" type="number" /></div>
            <div class="field"><label for="height">身高(cm)</label><input id="height" type="number" /></div>
          </div>

          <div class="row">
            <div class="field"><label for="weight">體重(kg)</label><input id="weight" type="number" /></div>
            <div class="field"><label>&nbsp;</label><div class="muted">（右欄保留給未來欄位）</div></div>
          </div>

          <div class="actions">
            <button class="btn primary" type="button" id="btnSave">儲存</button>
            <a class="btn" href="./profile-view.html">取消</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      requireLoginHere();
      const u = getUser() || { name:"Demo 使用者" };
      const demoProfile = JSON.parse(localStorage.getItem("demo_profile") || "null") || {
        name: u.name, sex: "男", age: 25, height: 170, weight: 65
      };
      name.value = demoProfile.name;
      sex.value = demoProfile.sex;
      age.value = demoProfile.age;
      height.value = demoProfile.height;
      weight.value = demoProfile.weight;

      btnSave.addEventListener("click", () => {
        const next = {
          name: name.value.trim() || u.name,
          sex: sex.value,
          age: Number(age.value || 0),
          height: Number(height.value || 0),
          weight: Number(weight.value || 0),
        };
        localStorage.setItem("demo_profile", JSON.stringify(next));
        alert("已儲存（示範）");
        location.href = "./profile-view.html";
      });
    });
  </script>
</body>
</html>
